name: CI & Deploy Pages

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  test:
    name: 塔防設定健全性測試
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: 執行 config.js 測試
        run: node scripts/test-config.js
      - name: 執行英雄抽卡/保底測試
        run: node scripts/test-heroes.js
      - name: 執行純規則函式測試
        run: node scripts/test-rules.js
      - name: 執行排行榜與成就測試
        run: node scripts/test-board.js
      - name: 執行平衡模擬驗證（三難度）
        run: node scripts/sim-balance.js
      - name: 語法檢查所有 JS
        run: |
          for f in src/*.js scripts/*.js; do node -c "$f" && echo "✓ $f"; done

  e2e:
    name: 塔防 E2E（真瀏覽器 桌機+手機）
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: 安裝 playwright + chromium
        run: |
          npm ci || npm install
          npx playwright install --with-deps chromium
      - name: 跑塔防 Stage 1 E2E（魂晶經濟/首抽免費/保底/暫停/主題波/建塔重繪/RWD）
        run: node scripts/test-td-e2e.js

  deploy:
    name: 部署 GitHub Pages
    needs: [test, e2e]
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: .
      - id: deployment
        uses: actions/deploy-pages@v4

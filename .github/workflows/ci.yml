name: CI & Deploy Pages

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  test:
    name: 單元與靜態守門
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - name: 安裝相依套件
        run: npm ci
      - name: 完整單元與動畫守門
        run: npm test
      - name: 全部 JavaScript 語法檢查
        run: |
          for f in src/*.js scripts/*.js; do node -c "$f" && echo "OK $f"; done

  e2e:
    name: R72、R66、R68、R71 與 463 項 E2E
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - name: 安裝 Playwright 與 Chromium
        run: |
          npm ci
          npx playwright install --with-deps chromium
      - name: CI 同款完整 E2E
        run: npm run test:e2e
      - name: RWD 9 視口守門
        run: npm run test:rwd
      - name: 幀時間與可視效能守門
        run: npm run test:perf

  deploy:
    name: 部署 GitHub Pages
    needs: [test, e2e]
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: .
      - id: deployment
        uses: actions/deploy-pages@v4
        with:
          timeout: 1800000

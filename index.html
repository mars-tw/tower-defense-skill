<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>無盡塔防 · Endless Tower Defense</title>
<style>
  /* ===== 設計系統：surface 色階 + 統一陰影/描邊（V1 視覺優化）===== */
  :root {
    --surface-0: #0c1620;   /* 頁面底 */
    --surface-1: #16241b;   /* 卡片/HUD */
    --surface-2: #1d3326;   /* hover */
    --surface-3: #243a2b;   /* active */
    --border-soft: rgba(255,255,255,.07);
    --border-hi: rgba(255,255,255,.12);
    --ink: #e6edf3; --ink-dim: #9fb0a4; --ink-meta: #7e9488;
    --accent: #4ade80; --gold: #facc15; --hp: #f87171; --info: #7dd3fc; --epic: #c084fc;
    --shadow-card: inset 0 1px 0 rgba(255,255,255,.05), 0 4px 12px rgba(0,0,0,.35);
    --shadow-pop: 0 6px 20px rgba(0,0,0,.45);
    --space: 8px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: "Segoe UI", "Microsoft JhengHei", system-ui, sans-serif;
    background: radial-gradient(ellipse at 50% 0%, #16242c, var(--surface-0));
    color: var(--ink); min-height: 100vh; display: flex; flex-direction: column;
    align-items: center; user-select: none; padding: 8px; gap: 8px;
  }
  h1 { font-size: 22px; letter-spacing: 2px; font-weight: 900; color: var(--accent);
    text-shadow: 0 0 18px rgba(74,222,128,.45), 0 2px 4px rgba(0,0,0,.6); }

  .wrap { display: flex; gap: 10px; align-items: flex-start; flex-wrap: wrap; justify-content: center; }

  /* HUD */
  .hud { display: flex; gap: 16px; align-items: center; padding: 10px 18px;
    background: linear-gradient(180deg, var(--surface-1), var(--surface-0));
    border: 1px solid var(--border-soft); border-radius: 14px; flex-wrap: wrap;
    box-shadow: var(--shadow-card); }
  .hud .stat { display: flex; align-items: center; gap: 6px; font-weight: 800; font-size: 16px;
    font-variant-numeric: tabular-nums; }
  .hud .gold { color: var(--gold); } .hud .lives { color: var(--hp); }
  .hud .wave { color: var(--accent); } .hud .score { color: var(--info); } .hud .best { color: var(--gold); }

  canvas { background: radial-gradient(ellipse at 50% 30%, #14241c, #0a130e);
    border: 1px solid var(--border-hi); border-radius: 14px;
    box-shadow: 0 10px 40px rgba(0,0,0,.55), inset 0 0 0 1px rgba(255,255,255,.03);
    cursor: pointer; max-width: 100%; height: auto; }
  canvas.shake { animation: screenShake .3s; }
  @keyframes screenShake { 0%,100%{transform:translate(0,0)} 20%{transform:translate(-5px,3px)} 40%{transform:translate(5px,-3px)} 60%{transform:translate(-4px,-2px)} 80%{transform:translate(4px,2px)} }

  /* 側欄 */
  .panel { width: 216px; display: flex; flex-direction: column; gap: var(--space); }
  .panel h3 { font-size: 13px; font-weight: 800; color: var(--ink-dim); margin: 4px 0 2px;
    letter-spacing: .5px; text-transform: none; }
  .tower-btn, .skill-btn {
    display: flex; align-items: center; gap: 9px; padding: 9px 11px; border-radius: 11px;
    background: var(--surface-1); border: 1px solid var(--border-soft);
    box-shadow: var(--shadow-card); cursor: pointer; transition: all .12s; text-align: left; width: 100%;
    color: var(--ink); font-family: inherit; min-height: 44px;
  }
  .tower-btn:hover, .skill-btn:hover { background: var(--surface-2);
    box-shadow: var(--shadow-card), 0 0 0 1px rgba(74,222,128,.4); transform: translateX(2px); }
  .tower-btn:active, .skill-btn:active { transform: translateY(1px); filter: brightness(.95); }
  .tower-btn.active { background: var(--surface-3); box-shadow: var(--shadow-card), inset 3px 0 0 var(--gold); }
  .tower-btn.cant, .skill-btn.cd { opacity: .45; cursor: not-allowed; }
  .tower-btn .ico, .skill-btn .ico { font-size: 23px; width: 28px; text-align: center; filter: drop-shadow(0 1px 2px rgba(0,0,0,.5)); }
  .tower-btn .info { flex: 1; }
  .tower-btn .nm { font-weight: 800; font-size: 13px; }
  .tower-btn .meta { font-size: 11px; color: var(--ink-meta); line-height: 1.3; }
  .tower-btn .cost { font-weight: 900; font-size: 14px; color: var(--gold); font-variant-numeric: tabular-nums; }
  .skill-btn .cdtext { font-size: 11px; color: var(--info); font-weight: 800; }
  /* 元素 chip（D3 克制可見化）*/
  .elem-chip { display: inline-block; font-size: 9px; font-weight: 800; padding: 1px 5px; border-radius: 6px;
    vertical-align: middle; white-space: nowrap; }
  .elem-physical { background: rgba(203,213,225,.18); color: #cbd5e1; }
  .elem-fire { background: rgba(249,115,22,.2); color: #fb923c; }
  .elem-ice { background: rgba(56,189,248,.2); color: #7dd3fc; }
  .elem-thunder { background: rgba(250,204,21,.2); color: #fde047; }

  .controls { display: flex; gap: 6px; flex-wrap: wrap; }
  button.act { flex: 1; padding: 11px; border: none; border-radius: 11px; font-weight: 800;
    font-size: 14px; cursor: pointer; font-family: inherit; min-height: 44px;
    box-shadow: 0 2px 8px rgba(0,0,0,.3); transition: filter .1s, transform .1s; }
  button.act:active { transform: translateY(1px); filter: brightness(.95); }
  .start { background: linear-gradient(180deg,#4ade80,#22c55e); color: #06210f; }
  .start:disabled { filter: grayscale(1) brightness(.6); cursor: not-allowed; }
  .speed { background: var(--surface-2); color: var(--ink); }
  .speed.on { background: var(--gold); color: #1a1206; }
  .goddess-btn { background: linear-gradient(180deg,#fde047,#f59e0b); color: #3a2606; width: 100%; }
  .goddess-btn:disabled { filter: grayscale(.5) brightness(.7); cursor: not-allowed; }
  .gacha-btn { background: linear-gradient(180deg,#a855f7,#7c3aed); color: #fff; width: 100%; }
  .gacha-btn:disabled { filter: grayscale(.5) brightness(.7); cursor: not-allowed; }
  #heroRoster { display: flex; flex-direction: column; gap: 6px; }
  .hero-card { display: flex; align-items: center; gap: 9px; padding: 8px 10px; border-radius: 10px;
    background: var(--surface-1); border: 1px solid var(--hr-color,var(--border-soft));
    box-shadow: var(--shadow-card); cursor: pointer; transition: all .12s; min-height: 44px; }
  .hero-card:hover { background: var(--surface-2); transform: translateX(2px); box-shadow: var(--shadow-card), 0 0 10px var(--hr-glow); }
  .hero-card:active { transform: translateY(1px); }
  .hero-card.deployed { opacity: .5; cursor: default; }
  .hero-card .hico { font-size: 21px; width: 26px; text-align: center; filter: drop-shadow(0 1px 2px rgba(0,0,0,.5)); }
  .hero-card .hinfo { flex: 1; font-size: 12px; }
  .hero-card .hname { font-weight: 800; color: var(--hr-color,var(--ink)); }
  .hero-card .hmeta { font-size: 11px; color: var(--ink-meta); line-height: 1.3; }
  .hero-card .hdeploy { font-size: 11px; font-weight: 800; color: var(--accent); }

  /* 選中塔的升級面板 */
  .sel-panel { background: var(--surface-1); border: 1px solid var(--border-soft); border-radius: 11px;
    padding: 11px; font-size: 12px; box-shadow: var(--shadow-card); }
  .sel-panel.hidden { display: none; }
  .sel-panel .row { display: flex; gap: 6px; margin-top: 9px; }
  .sel-panel button { flex: 1; padding: 9px; border: none; border-radius: 9px; font-weight: 800; cursor: pointer; font-family: inherit; min-height: 40px; transition: filter .1s, transform .1s; }
  .sel-panel button:active { transform: translateY(1px); filter: brightness(.95); }
  .upg { background: linear-gradient(180deg,#4ade80,#22c55e); color: #06210f; } .sell { background: linear-gradient(180deg,#f87171,#dc2626); color: #fff; }

  #log { width: min(960px, 96vw); min-height: 44px; overflow: hidden; font-size: 12px; color: var(--ink-meta);
    text-align: center; line-height: 1.5; padding: 4px; }
  #log .bad { color: var(--hp); font-weight: 700; }

  .overlay { position: fixed; inset: 0; background: rgba(8,12,10,.92); display: none;
    flex-direction: column; align-items: center; justify-content: center; gap: 16px; z-index: 50; }
  .overlay.show { display: flex; }
  .overlay h2 { font-size: 40px; color: #f87171; }
  .overlay .res { font-size: 20px; color: #facc15; }
  .meta-result { display: flex; flex-direction: column; gap: 6px; align-items: center; font-size: 15px; color: var(--ink); }
  .meta-result .record { font-size: 22px; font-weight: 900; color: #fde047; text-shadow: 0 0 16px #f59e0b; }
  .meta-result .meta-sub { font-size: 12px; color: var(--ink-dim); }
  .overlay button { background: #4ade80; color: #06210f; border: none; padding: 12px 32px;
    border-radius: 24px; font-size: 16px; font-weight: 800; cursor: pointer; }

  /* ===== 抽卡盲盒動畫 ===== */
  .gacha-overlay { position: fixed; inset: 0; background: rgba(6,10,8,.92); display: none;
    align-items: center; justify-content: center; z-index: 100; overflow: hidden; }
  .gacha-overlay.show { display: flex; }
  .gacha-stage { position: relative; text-align: center; }

  /* 寶箱 */
  .chest { cursor: pointer; transition: transform .2s; animation: chestFloat 2s ease-in-out infinite; }
  .chest:hover { transform: scale(1.08); }
  .chest.opening { animation: chestShake .5s ease, chestPop .4s ease .5s forwards; }
  .chest.hidden { display: none; }
  .chest-body { font-size: 110px; filter: drop-shadow(0 0 30px gold); }
  .chest-lid { display: none; }
  .chest-hint { color: #fde047; font-weight: 700; margin-top: 8px; letter-spacing: 2px; }

  /* 揭示 */
  .reveal { display: none; flex-direction: column; align-items: center; gap: 10px; }
  .reveal.show { display: flex; }
  .reveal-beam { position: absolute; left: 50%; top: 50%; width: 300px; height: 300px;
    transform: translate(-50%, -50%); border-radius: 50%; pointer-events: none;
    background: radial-gradient(circle, var(--rev-glow, gold), transparent 70%);
    animation: beamPulse 1.5s ease infinite; }
  .reveal-hero { font-size: 120px; position: relative; z-index: 2;
    filter: drop-shadow(0 0 20px var(--rev-color, gold)); animation: heroRise .6s ease; }
  .reveal-hero img { width: 160px; height: 160px; object-fit: contain; }
  .reveal-name { font-size: 28px; font-weight: 900; color: var(--rev-color, #fff);
    text-shadow: 0 0 16px var(--rev-glow); z-index: 2; position: relative; }
  .reveal-rarity { font-size: 18px; font-weight: 800; color: var(--rev-color); letter-spacing: 3px; z-index: 2; position: relative; }
  .reveal-ok { background: linear-gradient(180deg,#4ade80,#22c55e); color: #06210f; border: none;
    padding: 12px 36px; border-radius: 24px; font-size: 16px; font-weight: 800; cursor: pointer;
    z-index: 2; position: relative; margin-top: 8px; }

  @keyframes chestFloat { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-12px)} }
  @keyframes chestShake { 0%,100%{transform:translateX(0) rotate(0)} 20%{transform:translateX(-8px) rotate(-4deg)} 40%{transform:translateX(8px) rotate(4deg)} 60%{transform:translateX(-6px) rotate(-3deg)} 80%{transform:translateX(6px) rotate(3deg)} }
  @keyframes chestPop { to { transform: scale(1.8); opacity: 0; } }
  @keyframes beamPulse { 0%,100%{transform:translate(-50%,-50%) scale(1);opacity:.7} 50%{transform:translate(-50%,-50%) scale(1.2);opacity:1} }
  @keyframes heroRise { 0%{transform:translateY(40px) scale(.5);opacity:0} 100%{transform:translateY(0) scale(1);opacity:1} }

  /* ===== 首次遊玩引導（D3）===== */
  .tutorial-overlay { position: fixed; inset: 0; background: rgba(6,12,10,.9); display: none;
    align-items: center; justify-content: center; z-index: 120; padding: 16px; }
  .tutorial-overlay.show { display: flex; }
  .tutorial-card { background: linear-gradient(180deg, var(--surface-1), var(--surface-0));
    border: 1px solid var(--border-hi); border-radius: 18px; padding: 24px 28px; max-width: 440px;
    box-shadow: var(--shadow-pop); }
  .tutorial-card h2 { color: var(--accent); font-size: 24px; margin-bottom: 14px; text-align: center; }
  .tutorial-card ol { list-style: none; display: flex; flex-direction: column; gap: 10px; margin-bottom: 14px; }
  .tutorial-card li { font-size: 14px; line-height: 1.5; color: var(--ink); padding-left: 4px; }
  .tutorial-card li b { color: var(--gold); }
  .tut-tip { font-size: 12px; color: var(--ink-dim); line-height: 1.5; background: rgba(74,222,128,.08);
    padding: 10px 12px; border-radius: 10px; margin-bottom: 16px; }
  .tutorial-card button { width: 100%; background: linear-gradient(180deg,#4ade80,#22c55e); color: #06210f;
    border: none; padding: 13px; border-radius: 12px; font-size: 16px; font-weight: 800; cursor: pointer; }

  /* ===== RWD 響應式 ===== */
  /* canvas 維持 3:2 比例自適應，最大不超過容器 */
  canvas { width: 100%; max-width: 960px; height: auto; aspect-ratio: 3 / 2; touch-action: none; }
  .wrap { width: 100%; max-width: 1200px; }

  /* 平板/手機（窄於 900px）：側欄移到 canvas 下方、橫向排列 */
  @media (max-width: 900px) {
    body { padding: 4px; gap: 6px; }
    h1 { font-size: 16px; }
    .wrap { flex-direction: column; align-items: stretch; }
    .panel { width: 100%; }
    /* 建塔/技能/英雄列改橫向可滑動 */
    #towerList, #skillList, #heroRoster {
      display: flex; flex-direction: row; gap: 6px; overflow-x: auto;
      -webkit-overflow-scrolling: touch; padding-bottom: 4px;
    }
    #towerList .tower-btn, #skillList .skill-btn, #heroRoster .hero-card {
      flex: 0 0 auto; min-width: 150px; width: auto;
    }
    .panel h3 { margin-top: 4px; }
    .controls { flex-wrap: nowrap; }
  }

  /* 手機（窄於 560px）：再縮小字級、HUD 緊湊 */
  @media (max-width: 560px) {
    h1 { font-size: 14px; letter-spacing: 1px; }
    .hud { gap: 8px; padding: 6px 10px; }
    .hud .stat { font-size: 13px; }
    .tower-btn .meta, .skill-btn .meta, .hero-card .hmeta { display: none; } /* 手機隱藏說明文字省空間 */
    #towerList .tower-btn, #skillList .skill-btn, #heroRoster .hero-card { min-width: 120px; }
    .reveal-hero { font-size: 80px; } .reveal-hero img { width: 110px; height: 110px; }
    .chest-body { font-size: 80px; }
  }
</style>
</head>
<body>
  <h1>🏰 無盡塔防 · ENDLESS TOWER DEFENSE 🏰</h1>

  <div class="hud" id="hud">
    <div class="stat gold">💰 <span id="gold">200</span></div>
    <div class="stat lives">👸 <span id="goddessHp">100</span>/<span id="goddessMax">100</span></div>
    <div class="stat wave">🌊 第 <span id="wave">0</span> 波</div>
    <div class="stat score">⭐ <span id="score">0</span></div>
    <div class="stat best">🏆 最高 <span id="bestWave">0</span></div>
  </div>

  <div class="wrap">
    <canvas id="game" width="960" height="640"></canvas>

    <div class="panel">
      <div class="controls">
        <button class="act start" id="startBtn">▶ 開始下一波</button>
      </div>
      <div class="controls">
        <button class="act speed on" id="speed1" data-s="1">1×</button>
        <button class="act speed" id="speed2" data-s="2">2×</button>
      </div>
      <button class="act goddess-btn" id="goddessBtn">👸 升級女神</button>

      <h3>🗼 建造砲塔</h3>
      <div id="towerList"></div>

      <h3>🦸 英雄</h3>
      <button class="act gacha-btn" id="gachaBtn">🎲 抽英雄 (100💰)</button>
      <div id="heroRoster"></div>

      <h3>✨ 主動技能</h3>
      <div id="skillList"></div>

      <div class="sel-panel hidden" id="selPanel">
        <div id="selInfo"></div>
        <div class="row">
          <button class="upg" id="upgBtn">升級</button>
          <button class="sell" id="sellBtn">賣出</button>
        </div>
      </div>
    </div>
  </div>

  <div id="log"></div>

  <div class="overlay" id="overlay">
    <h2>💀 防線崩潰</h2>
    <div class="res">撐到第 <span id="finalWave">0</span> 波 · 得分 <span id="finalScore">0</span></div>
    <div class="meta-result" id="metaResult"></div>
    <button id="restartBtn">再來一局</button>
  </div>

  <!-- 抽卡盲盒動畫覆層 -->
  <div class="gacha-overlay" id="gachaOverlay">
    <div class="gacha-stage" id="gachaStage">
      <div class="chest" id="chest">
        <div class="chest-lid"></div>
        <div class="chest-body">🎁</div>
        <div class="chest-hint">點擊開啟</div>
      </div>
      <div class="reveal" id="reveal">
        <div class="reveal-beam" id="revealBeam"></div>
        <div class="reveal-hero" id="revealHero"></div>
        <div class="reveal-name" id="revealName"></div>
        <div class="reveal-rarity" id="revealRarity"></div>
        <button class="reveal-ok" id="revealOk">收下</button>
      </div>
    </div>
  </div>

  <!-- 首次遊玩引導（D3）-->
  <div class="tutorial-overlay" id="tutorial">
    <div class="tutorial-card">
      <h2>🏰 如何遊玩</h2>
      <ol>
        <li><b>① 選砲塔</b>：點右側砲塔（看元素 🔥火/❄️冰/⚡雷）</li>
        <li><b>② 蓋在地圖</b>：點地圖空格放塔（不能蓋路徑上）</li>
        <li><b>③ 開始下一波</b>：塔會自動攻擊沿路前進的怪物</li>
        <li><b>④ 守護女神</b>：別讓怪物漏到終點的女神！</li>
      </ol>
      <p class="tut-tip">💡 元素克制：火克冰、冰克雷、雷克火（克制造成 1.5 倍傷害）。抽英雄上場一起打怪！</p>
      <button id="tutorialOk">開始遊戲 ▶</button>
    </div>
  </div>

  <script src="src/config.js"></script>
  <script src="src/heroes.js"></script>
  <script src="src/game.js"></script>
  <script src="src/ui.js"></script>
</body>
</html>
